<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistora API Documentation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #1f1f35;
            --bg-input: #0f0f1a;
            --border: #2a2a40;
            --border-glow: #6c63ff33;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --text-muted: #555570;
            --accent-purple: #6c63ff;
            --accent-blue: #4fc3f7;
            --accent-cyan: #00e5ff;
            --accent-pink: #ff6b9d;
            --accent-green: #66ffb4;
            --accent-orange: #ffa726;
            --accent-red: #ff5252;
            --accent-yellow: #ffd740;
            --method-get: #66ffb4;
            --method-post: #4fc3f7;
            --method-put: #ffa726;
            --method-patch: #ffd740;
            --method-delete: #ff5252;
            --gradient-1: linear-gradient(135deg, #6c63ff, #4fc3f7);
            --gradient-2: linear-gradient(135deg, #ff6b9d, #ffa726);
            --gradient-3: linear-gradient(135deg, #66ffb4, #4fc3f7);
            --shadow-glow: 0 0 30px rgba(108, 99, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: float 20s ease-in-out infinite;
        }
        .bg-animation .orb:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-purple);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .bg-animation .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-cyan);
            top: 50%; right: -100px;
            animation-delay: -5s;
        }
        .bg-animation .orb:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--accent-pink);
            bottom: -50px; left: 30%;
            animation-delay: -10s;
        }
        .bg-animation .orb:nth-child(4) {
            width: 300px; height: 300px;
            background: var(--accent-green);
            top: 30%; left: 50%;
            animation-delay: -15s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -80px) scale(1.1); }
            50% { transform: translate(-30px, 60px) scale(0.9); }
            75% { transform: translate(80px, 30px) scale(1.05); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-purple);
            border-radius: 4px;
        }

        /* Layout */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 10;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: white;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(108, 99, 255, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(108, 99, 255, 0.2); }
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box .search-icon {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }
        .search-count {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            padding-left: 4px;
        }
        .sidebar-nav {
            padding: 12px 0;
        }
        .nav-category {
            padding: 8px 20px 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            transition: color 0.2s;
        }
        .nav-category:hover { color: var(--text-secondary); }
        .nav-category .arrow {
            transition: transform 0.3s;
            font-size: 10px;
        }
        .nav-category.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .nav-group {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .nav-group.collapsed {
            max-height: 0 !important;
        }
        .nav-item {
            padding: 6px 20px 6px 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12.5px;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }
        .nav-item:hover {
            background: rgba(108, 99, 255, 0.06);
            color: var(--text-primary);
            border-left-color: var(--accent-purple);
        }
        .nav-item.active {
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent-purple);
            border-left-color: var(--accent-purple);
        }
        .nav-method {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 3px;
            min-width: 36px;
            text-align: center;
        }
        .nav-method.get { background: rgba(102, 255, 180, 0.12); color: var(--method-get); }
        .nav-method.post { background: rgba(79, 195, 247, 0.12); color: var(--method-post); }
        .nav-method.put { background: rgba(255, 167, 38, 0.12); color: var(--method-put); }
        .nav-method.patch { background: rgba(255, 215, 64, 0.12); color: var(--method-patch); }
        .nav-method.delete { background: rgba(255, 82, 82, 0.12); color: var(--method-delete); }

        /* Main Content */
        .main-content {
            margin-left: 300px;
            flex: 1;
            padding: 0;
        }

        /* Hero */
        .hero {
            padding: 60px 48px 40px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(108, 99, 255, 0.05) 0%, transparent 100%);
        }
        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 12px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            position: relative;
        }
        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        .hero p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.7;
            position: relative;
        }
        .stats-bar {
            display: flex;
            gap: 32px;
            margin-top: 28px;
            position: relative;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .stat-item:hover {
            border-color: var(--accent-purple);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Base URL bar */
        .base-url-bar {
            margin: 0 48px 32px;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .base-url-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-purple);
            white-space: nowrap;
        }
        .base-url-input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--accent-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        .base-url-input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        /* API sections */
        .api-sections {
            padding: 0 48px 60px;
        }
        .category-section {
            margin-bottom: 40px;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .category-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .category-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .category-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent-purple);
            margin-left: auto;
        }

        /* Endpoint card */
        .endpoint-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .endpoint-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
        }
        .endpoint-card.expanded {
            border-color: var(--accent-purple);
        }
        .endpoint-header {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.2s;
        }
        .endpoint-header:hover {
            background: var(--bg-card-hover);
        }
        .method-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            min-width: 58px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .method-badge.get { background: rgba(102, 255, 180, 0.15); color: var(--method-get); border: 1px solid rgba(102, 255, 180, 0.2); }
        .method-badge.post { background: rgba(79, 195, 247, 0.15); color: var(--method-post); border: 1px solid rgba(79, 195, 247, 0.2); }
        .method-badge.put { background: rgba(255, 167, 38, 0.15); color: var(--method-put); border: 1px solid rgba(255, 167, 38, 0.2); }
        .method-badge.patch { background: rgba(255, 215, 64, 0.15); color: var(--method-patch); border: 1px solid rgba(255, 215, 64, 0.2); }
        .method-badge.delete { background: rgba(255, 82, 82, 0.15); color: var(--method-delete); border: 1px solid rgba(255, 82, 82, 0.2); }

        .endpoint-path {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-primary);
            flex: 1;
            word-break: break-all;
        }
        .endpoint-path .param {
            color: var(--accent-orange);
        }
        .endpoint-desc {
            font-size: 12px;
            color: var(--text-muted);
            max-width: 300px;
            text-align: right;
        }
        .expand-icon {
            color: var(--text-muted);
            transition: transform 0.3s;
            font-size: 12px;
        }
        .endpoint-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        /* Endpoint body (test area) */
        .endpoint-body {
            display: none;
            border-top: 1px solid var(--border);
            padding: 20px;
            animation: slideDown 0.3s ease;
        }
        .endpoint-card.expanded .endpoint-body {
            display: block;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tabs */
        .test-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            background: var(--bg-input);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border);
        }
        .test-tab {
            flex: 1;
            padding: 10px 16px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .test-tab:hover { color: var(--text-primary); }
        .test-tab.active {
            background: var(--accent-purple);
            color: white;
            box-shadow: 0 2px 8px rgba(108, 99, 255, 0.3);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Form area */
        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            transition: all 0.3s;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Body fields */
        .body-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .body-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .body-field label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-cyan);
        }
        .body-field input {
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid rgba(79, 195, 247, 0.25);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: all 0.3s;
        }
        .body-field input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.12);
        }
        .body-field input::placeholder {
            color: var(--text-muted);
        }
        .body-mode-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .body-mode-toggle button {
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .body-mode-toggle button.active {
            background: rgba(79, 195, 247, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        .body-mode-toggle button:hover {
            color: var(--text-primary);
        }
        @media (max-width: 900px) {
            .body-fields { grid-template-columns: 1fr; }
        }

        /* Headers section */
        .headers-section {
            margin-bottom: 14px;
        }
        .header-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            align-items: center;
        }
        .header-row input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        .header-row input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }
        .btn-remove-header {
            padding: 6px 10px;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.2);
            border-radius: 6px;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-remove-header:hover {
            background: rgba(255, 82, 82, 0.2);
        }
        .btn-add-header {
            padding: 6px 12px;
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-radius: 6px;
            color: var(--accent-purple);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-add-header:hover {
            background: rgba(108, 99, 255, 0.2);
        }

        /* Buttons */
        .btn-send {
            padding: 12px 28px;
            background: var(--gradient-1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-send::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-send:hover::before { left: 100%; }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.35);
        }
        .btn-send:active { transform: translateY(0); }
        .btn-send.loading {
            opacity: 0.7;
            pointer-events: none;
        }
        .btn-copy-curl {
            padding: 10px 20px;
            background: rgba(255, 107, 157, 0.12);
            border: 1px solid rgba(255, 107, 157, 0.25);
            border-radius: 10px;
            color: var(--accent-pink);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-copy-curl:hover {
            background: rgba(255, 107, 157, 0.2);
            transform: translateY(-2px);
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        /* cURL display */
        .curl-display {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-cyan);
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
            position: relative;
            display: none;
        }
        .curl-display.visible { display: block; }
        .curl-kw { color: var(--accent-pink); }
        .curl-url { color: var(--accent-green); }
        .curl-header { color: var(--accent-orange); }
        .curl-data { color: var(--accent-cyan); }

        /* Response area */
        .response-area {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            display: none;
        }
        .response-area.visible { display: block; }
        .response-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .response-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
        }
        .response-status.success { background: rgba(102, 255, 180, 0.15); color: var(--method-get); }
        .response-status.error { background: rgba(255, 82, 82, 0.15); color: var(--method-delete); }
        .response-time {
            font-size: 12px;
            color: var(--text-muted);
        }
        .response-body {
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-primary);
            line-height: 1.7;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Param inputs */
        .param-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }
        .param-chip {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .param-chip label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--accent-orange);
            letter-spacing: 0.5px;
        }
        .param-chip input {
            padding: 8px 12px;
            background: var(--bg-input);
            border: 1px solid rgba(255, 167, 38, 0.3);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            width: 160px;
        }
        .param-chip input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(255, 167, 38, 0.1);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            z-index: 9999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success { background: linear-gradient(135deg, #2d7a4f, #1a5c3a); }
        .toast.error { background: linear-gradient(135deg, #7a2d2d, #5c1a1a); }
        .toast.info { background: linear-gradient(135deg, #2d4a7a, #1a3a5c); }

        /* Mobile toggle */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 16px; left: 16px;
            z-index: 200;
            width: 42px; height: 42px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            align-items: center; justify-content: center;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
            display: none;
        }
        .no-results.visible { display: block; }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .mobile-toggle {
                display: flex;
            }
            .hero { padding: 80px 20px 30px; }
            .hero h1 { font-size: 28px; }
            .base-url-bar { margin: 0 20px 24px; flex-direction: column; align-items: stretch; }
            .api-sections { padding: 0 20px 40px; }
            .stats-bar { flex-wrap: wrap; gap: 12px; }
            .form-row { grid-template-columns: 1fr; }
        }

        /* backdrop for mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }
        .sidebar-backdrop.visible { display: block; }

        /* Highlight matching text */
        mark {
            background: rgba(108, 99, 255, 0.3);
            color: var(--text-primary);
            padding: 0 2px;
            border-radius: 2px;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    function buildBodyFields(bodyStr, epId) {
        if (!bodyStr || bodyStr.includes('multipart')) return `<div class="body-fields"><p style="color:var(--text-muted); font-size:12px; grid-column:1/-1;">Use Raw JSON mode or multipart form tool for this endpoint.</p></div>`;

            const parsed = JSON.parse(bodyStr);
            const keys = Object.keys(parsed);
            if (keys.length === 0) return `<div class="body-fields"><p style="color:var(--text-muted); font-size:12px; grid-column:1/-1;">Add fields via Raw JSON mode</p></div>`;
            let html = '<div class="body-fields">';
            keys.forEach(key => {
                const val = parsed[key] || '';
                const inputType = key.toLowerCase().includes('password') ? 'password' : 'text';
                html += `<div class="body-field">
                    <label>${key}</label>
                    <input type="${inputType}" data-key="${key}" placeholder="Enter ${key}" value="${val}">
                </div>`;
            });
            html += '</div>';
            return html;
        } catch {
            return `<div class="body-fields"><p style="color:var(--text-muted); font-size:12px; grid-column:1/-1;">Cannot parse fields. Use Raw JSON mode.</p></div>`;
        }
    }

    function switchBodyMode(epId, mode, btn) {
        const fieldsContainer = document.getElementById(`${epId}-body-fields`);
        const textarea = document.getElementById(`${epId}-body`);
        const toggleBtns = btn.parentElement.querySelectorAll('button');
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (mode === 'fields') {
            fieldsContainer.style.display = '';
            textarea.style.display = 'none';
            // Sync fields -> textarea
        } else {
            // Sync form field values to textarea JSON before showing
            const inputs = fieldsContainer.querySelectorAll('.body-field input');
            if (inputs.length > 0) {
                const obj = {};
                inputs.forEach(input => {
                    obj[input.dataset.key] = input.value;
                });
                textarea.value = JSON.stringify(obj, null, 2);
            }
            fieldsContainer.style.display = 'none';
            textarea.style.display = '';
        }
    }

    function getParamsFromPath(path) {
        const matches = path.match(/\{([^}]+)\}/g);
        return matches ? matches.map(m => m.replace(/[{}?]/g, '')) : [];
    }

    function renderPath(path) {
        return path.replace(/\{([^}]+)\}/g, '<span class="param">{$1}</span>');
    }

    function generateId(cat, idx) {
        return 'ep-' + cat.replace(/[^a-zA-Z0-9]/g, '') + '-' + idx;
    }

    function buildSidebar() {
        const nav = document.getElementById('sidebarNav');
        let html = '';
        API_DATA.forEach((cat, ci) => {
            const catId = 'cat-' + ci;
            html += `<div class="nav-category" data-target="${catId}" onclick="toggleNavGroup(this)">
                <span>${cat.icon} ${cat.category}</span>
                <span class="arrow">▼</span>
            </div>`;
            html += `<div class="nav-group" id="${catId}">`;
            cat.endpoints.forEach((ep, ei) => {
                const epId = generateId(cat.category, ei);
                html += `<div class="nav-item" data-endpoint="${epId}" onclick="scrollToEndpoint('${epId}')">
                    <span class="nav-method ${ep.method.toLowerCase()}">${ep.method}</span>
                    <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${ep.path}</span>
                </div>`;
            });
            html += '</div>';
        });
        nav.innerHTML = html;
    }

    function buildMainContent() {
        const container = document.getElementById('apiSections');
        let html = '';
        API_DATA.forEach((cat, ci) => {
            html += `<div class="category-section" data-category="${cat.category}" id="section-${ci}">`;
            html += `<div class="category-title">
                <span class="category-icon" style="background:${cat.color}22; color:${cat.color}">${cat.icon}</span>
                <span>${cat.category}</span>
                <span class="category-badge">${cat.endpoints.length} endpoints</span>
            </div>`;
            cat.endpoints.forEach((ep, ei) => {
                const epId = generateId(cat.category, ei);
                const params = getParamsFromPath(ep.path);
                const hasBody = ep.body && !['GET', 'DELETE'].includes(ep.method);
                html += `<div class="endpoint-card" id="${epId}" data-method="${ep.method}" data-path="${ep.path}" data-desc="${ep.desc}">
                    <div class="endpoint-header" onclick="toggleEndpoint('${epId}')">
                        <span class="method-badge ${ep.method.toLowerCase()}">${ep.method}</span>
                        <span class="endpoint-path">${renderPath(ep.path)}</span>
                        <span class="endpoint-desc">${ep.desc}</span>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="endpoint-body">
                        <div class="test-tabs">
                            <div class="test-tab active" onclick="switchTab(this, '${epId}', 'try')">🚀 Try It</div>
                            <div class="test-tab" onclick="switchTab(this, '${epId}', 'curl')">📋 cURL</div>
                        </div>

                        <!-- TRY IT TAB -->
                        <div class="tab-content active" id="${epId}-try">
                            ${params.length ? `
                            <div class="form-group">
                                <label class="form-label">URL Parameters</label>
                                <div class="param-inputs">
                                    ${params.map(p => `
                                    <div class="param-chip">
                                        <label>${p}</label>
                                        <input type="text" class="param-input" data-param="${p}" placeholder="Enter ${p}">
                                    </div>`).join('')}
                                </div>
                            </div>` : ''}

                            <div class="headers-section">
                                <label class="form-label">Headers</label>
                                <div class="headers-list" id="${epId}-headers">
                                    <div class="header-row">
                                        <input type="text" placeholder="Key" value="Accept">
                                        <input type="text" placeholder="Value" value="application/json">
                                        <button class="btn-remove-header" onclick="removeHeader(this)">✕</button>
                                    </div>
                                    <div class="header-row">
                                        <input type="text" placeholder="Key" value="Content-Type">
                                        <input type="text" placeholder="Value" value="application/json">
                                        <button class="btn-remove-header" onclick="removeHeader(this)">✕</button>
                                    </div>
                                </div>
                                <button class="btn-add-header" onclick="addHeader('${epId}')">+ Add Header</button>
                            </div>

                            ${ep.body ? `
                            <div class="form-group">
                                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                                    <label class="form-label" style="margin-bottom:0">Request Body</label>
                                    <div class="body-mode-toggle">
                                        <button class="active" onclick="switchBodyMode('${epId}', 'fields', this)">📝 Form Fields</button>
                                        <button onclick="switchBodyMode('${epId}', 'raw', this)">{ } Raw JSON</button>
                                    </div>
                                </div>
                                <div class="body-fields-container" id="${epId}-body-fields">${buildBodyFields(ep.body, epId)}</div>
                                <textarea class="form-textarea" id="${epId}-body" placeholder="Enter JSON body" style="display:none">${ep.body}</textarea>
                            </div>` : ''}

                            <div class="btn-group">
                                <button class="btn-send" onclick="sendRequest('${epId}', '${ep.method}', '${ep.path}')">
                                    <span>⚡</span> Send Request
                                </button>
                                <button class="btn-copy-curl" onclick="generateAndShowCurl('${epId}', '${ep.method}', '${ep.path}')">
                                    <span>📋</span> Show cURL
                                </button>
                            </div>
                        </div>

                        <!-- CURL TAB -->
                        <div class="tab-content" id="${epId}-curl">
                            <div class="form-group">
                                <label class="form-label">Generated cURL Command</label>
                                <div class="curl-display visible" id="${epId}-curl-output">Click "Generate cURL" below or fill in the Try It tab first</div>
                            </div>
                            <div class="btn-group">
                                <button class="btn-copy-curl" onclick="copyCurl('${epId}')">
                                    <span>📋</span> Copy to Clipboard
                                </button>
                                <button class="btn-send" onclick="generateCurlFromTab('${epId}', '${ep.method}', '${ep.path}')">
                                    <span>⚙️</span> Generate cURL
                                </button>
                            </div>
                        </div>

                        <div class="curl-display" id="${epId}-curl-inline"></div>

                        <div class="response-area" id="${epId}-response">
                            <div class="response-header">
                                <span class="response-status" id="${epId}-status"></span>
                                <span class="response-time" id="${epId}-time"></span>
                            </div>
                            <pre class="response-body" id="${epId}-response-body"></pre>
                        </div>
                    </div>
                </div>`;
            });
            html += '</div>';
        });
        container.innerHTML = html;
    }

    // =========== INTERACTIONS ===========
    function toggleEndpoint(id) {
        const card = document.getElementById(id);
        card.classList.toggle('expanded');
    }

    function scrollToEndpoint(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (!el.classList.contains('expanded')) {
            el.classList.add('expanded');
        }
        el.style.borderColor = 'var(--accent-cyan)';
        setTimeout(() => el.style.borderColor = '', 1500);
        // Close mobile sidebar
        document.getElementById('sidebar').classList.remove('open');
        document.querySelector('.sidebar-backdrop').classList.remove('visible');
    }

    function toggleNavGroup(el) {
        el.classList.toggle('collapsed');
        const target = document.getElementById(el.dataset.target);
        target.classList.toggle('collapsed');
    }

    function switchTab(tabEl, epId, tabName) {
        const parent = tabEl.parentElement;
        parent.querySelectorAll('.test-tab').forEach(t => t.classList.remove('active'));
        tabEl.classList.add('active');
        const card = document.getElementById(epId);
        card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${epId}-${tabName}`).classList.add('active');
    }

    function addHeader(epId) {
        const list = document.getElementById(`${epId}-headers`);
        const row = document.createElement('div');
        row.className = 'header-row';
        row.innerHTML = `
            <input type="text" placeholder="Key">
            <input type="text" placeholder="Value">
            <button class="btn-remove-header" onclick="removeHeader(this)">✕</button>`;
        list.appendChild(row);
    }

    function removeHeader(btn) {
        btn.parentElement.remove();
    }

    function getHeaders(epId) {
        const headers = {};
        const rows = document.querySelectorAll(`#${epId}-headers .header-row`);
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            const key = inputs[0].value.trim();
            const val = inputs[1].value.trim();
            if (key) headers[key] = val;
        });
        return headers;
    }

    function buildUrl(epId, path) {
        const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '');
        let finalPath = path;
        const card = document.getElementById(epId);
        const paramInputs = card.querySelectorAll('.param-input');
        paramInputs.forEach(input => {
            const param = input.dataset.param;
            const value = input.value.trim();
            if (value) {
                finalPath = finalPath.replace(`{${param}}`, encodeURIComponent(value));
                finalPath = finalPath.replace(`{${param}?}`, encodeURIComponent(value));
            } else {
                // Remove optional params with trailing slash
                finalPath = finalPath.replace(`/{${param}?}`, '');
                finalPath = finalPath.replace(`{${param}?}`, '');
            }
        });
        return baseUrl + finalPath;
    }

    function getBody(epId) {
        const bodyEl = document.getElementById(`${epId}-body`);
        const fieldsContainer = document.getElementById(`${epId}-body-fields`);
        if (!bodyEl) return null;
        // If form fields mode is visible, build JSON from fields
        if (fieldsContainer && fieldsContainer.style.display !== 'none') {
            const inputs = fieldsContainer.querySelectorAll('.body-field input');
            if (inputs.length > 0) {
                const obj = {};
                inputs.forEach(input => {
                    const key = input.dataset.key;
                    const val = input.value;
                    if (key) obj[key] = val;
                });
                return JSON.stringify(obj, null, 2);
            }
        }
        return bodyEl.value || null;
    }

    function buildCurlCommand(epId, method, path) {
        const url = buildUrl(epId, path);
        const headers = getHeaders(epId);
        const body = getBody(epId);
        let cmd = `curl -X ${method}`;
        cmd += ` \\\n  '${url}'`;
        Object.entries(headers).forEach(([k, v]) => {
            cmd += ` \\\n  -H '${k}: ${v}'`;
        });
        if (body && !['GET', 'DELETE'].includes(method)) {
            try {
                const parsed = JSON.parse(body);
                cmd += ` \\\n  -d '${JSON.stringify(parsed)}'`;
            } catch {
                cmd += ` \\\n  -d '${body}'`;
            }
        }
        return cmd;
    }

    function generateAndShowCurl(epId, method, path) {
        const cmd = buildCurlCommand(epId, method, path);
        const inlineEl = document.getElementById(`${epId}-curl-inline`);
        inlineEl.textContent = cmd;
        inlineEl.classList.add('visible');
        // Also update curl tab
        document.getElementById(`${epId}-curl-output`).textContent = cmd;
    }

    function generateCurlFromTab(epId, method, path) {
        const cmd = buildCurlCommand(epId, method, path);
        document.getElementById(`${epId}-curl-output`).textContent = cmd;
    }

    function copyCurl(epId) {
        const text = document.getElementById(`${epId}-curl-output`).textContent;
        navigator.clipboard.writeText(text).then(() => {
            showToast('cURL command copied to clipboard!', 'success');
        }).catch(() => {
            showToast('Failed to copy', 'error');
        });
    }

    async function sendRequest(epId, method, path) {
        const url = buildUrl(epId, path);
        const headers = getHeaders(epId);
        const body = getBody(epId);
        const btn = document.querySelector(`#${epId} .btn-send`);
        const responseArea = document.getElementById(`${epId}-response`);
        const statusEl = document.getElementById(`${epId}-status`);
        const timeEl = document.getElementById(`${epId}-time`);
        const bodyEl = document.getElementById(`${epId}-response-body`);

        btn.classList.add('loading');
        btn.innerHTML = '<span class="spinner"></span> Sending...';

        const startTime = performance.now();

        try {
            const options = {
                method: method,
                headers: headers
            };
            if (body && !['GET', 'HEAD'].includes(method)) {
                options.body = body;
            }
            const response = await fetch(url, options);
            const endTime = performance.now();
            const duration = Math.round(endTime - startTime);
            const responseText = await response.text();

            let formattedResponse;
            try {
                formattedResponse = JSON.stringify(JSON.parse(responseText), null, 2);
            } catch {
                formattedResponse = responseText;
            }

            statusEl.textContent = `${response.status} ${response.statusText}`;
            statusEl.className = `response-status ${response.ok ? 'success' : 'error'}`;
            timeEl.textContent = `${duration}ms`;
            bodyEl.textContent = formattedResponse;
            responseArea.classList.add('visible');

            showToast(`${response.status} - Request completed in ${duration}ms`, response.ok ? 'success' : 'error');
        } catch (err) {
            const endTime = performance.now();
            const duration = Math.round(endTime - startTime);
            statusEl.textContent = 'Error';
            statusEl.className = 'response-status error';
            timeEl.textContent = `${duration}ms`;
            bodyEl.textContent = `Network Error: ${err.message}\n\nMake sure the API server is running and CORS is enabled.`;
            responseArea.classList.add('visible');
            showToast('Request failed - check console for details', 'error');
        } finally {
            btn.classList.remove('loading');
            btn.innerHTML = '<span>⚡</span> Send Request';
        }
    }

    function showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.querySelector('.sidebar-backdrop').classList.toggle('visible');
    }

    // =========== SEARCH ===========
    function filterAPIs() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const sections = document.querySelectorAll('.category-section');
        const navItems = document.querySelectorAll('.nav-item');
        const navCategories = document.querySelectorAll('.nav-category');
        const navGroups = document.querySelectorAll('.nav-group');
        let visibleCount = 0;
        let visibleCats = 0;

        if (!query) {
            sections.forEach(s => s.style.display = '');
            document.querySelectorAll('.endpoint-card').forEach(c => c.style.display = '');
            navItems.forEach(n => n.style.display = '');
            navCategories.forEach(n => n.style.display = '');
            navGroups.forEach(g => { g.style.display = ''; g.classList.remove('collapsed'); });
            document.getElementById('searchCount').textContent = '';
            document.getElementById('noResults').classList.remove('visible');
            return;
        }

        sections.forEach((section, si) => {
            const cards = section.querySelectorAll('.endpoint-card');
            let catVisible = false;
            cards.forEach((card, ci) => {
                const method = card.dataset.method.toLowerCase();
                const path = card.dataset.path.toLowerCase();
                const desc = card.dataset.desc.toLowerCase();
                const catName = section.dataset.category.toLowerCase();
                const match = method.includes(query) || path.includes(query) || desc.includes(query) || catName.includes(query);
                card.style.display = match ? '' : 'none';
                if (match) { visibleCount++; catVisible = true; }
            });
            section.style.display = catVisible ? '' : 'none';
            if (catVisible) visibleCats++;
        });

        // Update sidebar visibility too
        navCategories.forEach((navCat, i) => {
            const group = document.getElementById(navCat.dataset.target);
            const items = group.querySelectorAll('.nav-item');
            let groupVisible = false;
            items.forEach(item => {
                const epId = item.dataset.endpoint;
                const card = document.getElementById(epId);
                if (card) {
                    const visible = card.style.display !== 'none';
                    item.style.display = visible ? '' : 'none';
                    if (visible) groupVisible = true;
                }
            });
            navCat.style.display = groupVisible ? '' : 'none';
            group.style.display = groupVisible ? '' : 'none';
            if (groupVisible) group.classList.remove('collapsed');
        });

        document.getElementById('searchCount').textContent = `${visibleCount} endpoint${visibleCount !== 1 ? 's' : ''} found in ${visibleCats} categor${visibleCats !== 1 ? 'ies' : 'y'}`;
        document.getElementById('noResults').classList.toggle('visible', visibleCount === 0);
    }

    // =========== KEYBOARD SHORTCUTS ===========
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
    });

    // =========== INIT ===========
    // Auto-detect base URL from current page location
    (function() {
        const loc = window.location;
        // Derive the base path from the current page URL
        // e.g. if page is at /public/apidocs, base is /public/api
        const pagePath = loc.pathname;
        const basePath = pagePath.substring(0, pagePath.lastIndexOf('/'));
        const baseUrl = loc.protocol + '//' + loc.host + basePath + '/api';
        document.getElementById('baseUrl').value = baseUrl;
    })();
    buildSidebar();
    buildMainContent();
    </script>
</body>
</html>
